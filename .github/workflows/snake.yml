name: generate animation

on:
  # Run automatically every day at midnight
  schedule:
    - cron: "0 0 * * *" 
  
  # Allows to manually run the job at any time
  workflow_dispatch:
  
  # Run on every push on the main branch
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Generates the snake
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: TechSammed
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#38BDF8&color_dots=#0B1120,#1e293b,#334155,#475569,#38BDF8
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#38BDF8
          
      # Pushes the animation to the 'output' branch
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}